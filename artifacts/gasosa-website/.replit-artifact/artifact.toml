kind = "web"
previewPath = "/"
title = "Gasosa Auto Agro"
version = "1.0.0"
id = "artifacts/gasosa-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18838

[services.development]
run = "pnpm --filter @workspace/gasosa-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gasosa-website", "run", "build" ]
publicDir = "artifacts/gasosa-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18838"
BASE_PATH = "/"
